<html>
<head>
    <title>Employee Details using Array Constructor Method</title>
</head>
<body>
    <h2>Employee Details using Array Constructor Method</h2>
    <script>
        function employee(eid, ename, bp, dedu) {
            this.eid = eid;
            this.ename = ename;
            this.hra = bp * 0.30;
            this.ta = bp * 0.53;
            this.da = bp * 0.15;
            this.totalsalary = bp + this.hra + this.ta + this.da;
            this.netsalary = this.totalsalary - dedu;
        }
        var employees = [];
        var n = parseInt(prompt("Kitne employees ka data enter karna hai?"));

        for (var i = 0; i < n; i++) {
            var id = parseInt(prompt("Employee ID enter karein:"));
            var name = prompt("Employee Name enter karein:");
            var basicPay = parseFloat(prompt("Basic Pay enter karein:"));
            var deduction = parseFloat(prompt("Deduction enter karein:"));

            employees.push(new employee(id, name, basicPay, deduction));
        }
        document.write("<table border='1' cellspacing='0' cellpadding='10'>");
        document.write("<tr><th>Employee Id</th><th>Name</th><th>HRA</th><th>TA</th><th>DA</th><th>Total Salary</th><th>Net Salary</th></tr>");

        for (var i = 0; i < employees.length; i++) {
            document.write("<tr>");
            document.write("<td>" + employees[i].eid + "</td>");
            document.write("<td>" + employees[i].ename + "</td>");
            document.write("<td>₹ " + employees[i].hra + "</td>");
            document.write("<td>₹ " + employees[i].ta + "</td>");
            document.write("<td>₹ " + employees[i].da + "</td>");
            document.write("<td>₹ " + employees[i].totalsalary + "</td>");
            document.write("<td>₹ " + employees[i].netsalary + "</td>");
            document.write("</tr>");
        }
        document.write("</table>");
    </script>

</body>
</html>
