<!DOCTYPE html>
<html lang="en">
<body>

<h2>Sum of a digit and Reversed</h2>

<form method="POST">
    Enter Number:
    <input type="number" name="number" required>
    <input type="submit" name="submit" value="Sum & Reverse">
</form>

<?php
if(isset($_POST['submit'])){
    $n = $_POST['number'];
    $rev = 0;
    $dup = $n;
    $sum = 0;
    do{
        $digit = $n % 10;
        $rev = $rev * 10 + $digit;
        $n = floor($n/10);
        $sum = $sum + $digit;
    }
        while($n>0);
    
    echo "The real number is: ".$dup;
    echo "<br>Reverse number is: ".$rev;
    echo "<br> Sum of Digit is: ".$sum;
}

?>
