<!DOCTYPE html>
<html lang="en">
<body>

<h2>Sum of 'N' number</h2>

<form method="POST">
    Enter Number:
    <input type="number" name="limit" required>
    <input type="submit" name="submit" value="Sum">
</form>

<?php
if(isset($_POST['submit'])){
    $n = $_POST['limit'];
    $sum = 0;
    for($i=0; $i<=$n; $i++){
        echo $i." ";
        $sum+=$i;
    }
    echo "<br>Sum of ".$n." number is ".$sum;
}

?>

</body>
</html>
