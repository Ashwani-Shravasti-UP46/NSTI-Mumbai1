<!DOCTYPE html>
<html lang="en">
<body>

<h2>Multiplication Table</h2>

<form method="POST">
    Enter Number:
    <input type="number" name="limit" required>
    <input type="submit" name="submit" value="Show Table">
</form>

<?php
if(isset($_POST['submit'])){
    $n = $_POST['limit'];

    echo "<h3>Table of $n</h3>";

    for($i=1; $i<=10; $i++){
        echo "$n × $i = ".($n*$i)."<br>";
    }
}
?>

</body>
</html>
