<html lang="en">
<body>

<h2>Number is perfect or not</h2>

<form method="POST">
    Enter Number:
    <input type="number" name="number" required>
    <input type="submit" name="submit" value="check number">
</form>

<?php
if(isset($_POST['submit'])){
    $n = $_POST['number'];
    $sum = 0;
    for($i=1; $i<=$n/2; $i++){
        if($n % $i == 0){
            $sum+=$i;
        }
    }
    if($sum==$n && $n!=0)
        echo $n." it's perfect number";
    else
        echo $n." it's not perfect number";

}

?>
