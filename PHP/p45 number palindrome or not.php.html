<!DOCTYPE html>
<html lang="en">
<body>

<h2>Number is palindrome or not</h2>

<form method="POST">
    Enter Number:
    <input type="number" name="number" required>
    <input type="submit" name="submit" value="check number">
</form>

<?php
if(isset($_POST['submit'])){
    $n = $_POST['number'];
    $rev = 0;
    $dup = $n;
    do{
        $digit = $n%10;
        $rev = $rev * 10 + $digit;
        $n = floor($n/10);
    }
        while($n>0);
    if($dup==$rev)
        echo $dup." The number is palindrome: ".$rev;
    else    
        echo $dup." The number is not palindrome: ".$rev;
}

?>
