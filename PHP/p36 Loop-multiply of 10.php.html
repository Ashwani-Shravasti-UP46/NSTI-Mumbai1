<!DOCTYPE html>
<html lang="en">
<body>

<h2>Multiples of 10 below 'N'</h2>

<form method="POST">
    Enter limit
    <input type="number" name="limit" required>
    <input type="submit" name="submit" value="Start Loop">
</form>

<?php
if(isset($_POST['submit'])){
    $n = $_POST['limit'];

    echo "<b>Output:</b> ";

    for($i=10; $i<$n; $i+=10){
        echo $i." ";
    }
}
?>

</body>
</html>
