<!DOCTYPE html>
<html lang="en">
<body>

<h2>Number is Armstrong or not</h2>

<form method="POST">
    Enter Number:
    <input type="number" name="number" required>
    <input type="submit" name="submit" value="check number">
</form>

<?php
if(isset($_POST['submit'])){
    $n = $_POST['number'];
    $sum = 0;
    $dup = $n;
    $length = strlen((string)$n);

    while($n>0){
        $digit = $n % 10;
        $sum = $sum + $digit ** $length;
        $n = floor($n/10);
    }
    if($dup==$sum)
        echo $dup." is armstrong!!";
    else
        echo $dup." is not armstrong!!";
}

?>

</body>
</html>
