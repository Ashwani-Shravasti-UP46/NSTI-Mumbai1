<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Duplicate Elements</title>
</head>

<body>

    <h1>Develop JavaScript code to Remove Duplicate Elements from Array</h1>

    <script>
        var a, b;
        var i, j, n, k = 0;
        var isDuplicate;

        a = new Array();
        b = new Array();

        n = parseInt(prompt("Enter the Array limit: "));

        // Input Array
        for (i = 0; i < n; i++) {
            a[i] = parseInt(prompt("Enter the Array Element: "));
        }

        document.write("<br>Entered Array Elements are: " + a + "<br><br>");

        // Remove Duplicates
        for (i = 0; i < n; i++) {
            isDuplicate = false;

            for (j = 0; j < k; j++) {
                if (a[i] == b[j]) {
                    isDuplicate = true;
                    break;
                }
            }

            if (!isDuplicate) {
                b[k] = a[i];
                k++;
            }
        }

        // Display Array without Duplicates
        document.write("Array after Removing Duplicates: " + b + "<br><br>");

        document.write("Elements individually:<br>");
        for (i = 0; i < k; i++) {
            document.write(b[i] + " ");
        }

    </script>

</body>

</html>
