<!doctype html>
<html>
<head>
<title>day code</title>
</head>
<body>
<script>
let day=parseInt(prompt("Enter your day:"));
let result;
switch(day){
case 1:
     result="sunday";
       break;

case2:
      result="monday";
      break;

case 3:
     result="tuesday";
     break;
case 4:
 result="wednesday";
     break;
case 5:
 result="thursday";
     break;
case 6:
 result="friday";
     break;
case 7:
 result="saturday";
     break;

    

 
default:
   result="Invoid input please day";
}
      document.write("day"+day+" daycode ="+result);
</script>
</body>
</html>
