<!DOCTYPE html>
<html>
<head>
	<title>Display Natural Number </title>
	</head>
      <body>
	<h3>Display Natural Number </h3>
     <script>
                let n = prompt("Enter a number :");
                n = parseInt(n);
            document.write("<br>Natural numbers below " + n + ":<br><br>");
	
      for  (let  i = 1; i < n;  i++)  {
         document.write( i + "<br>");
}
	</script>
         </body>
      </html>
