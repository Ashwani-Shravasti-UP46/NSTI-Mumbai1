<!DOCTYPE html>
<html>
<head>
	<title>Even numbers </title>
	</head>
      <body>
     <script>
      let n = parseInt(prompt("Enter a number : "));
      document.write("Even number upto " + n + " are: <br>"); 
      for  (let  i = 2;  i <=n;  i +=2)  {
     
         document.write( i + "<br>");
       }
    
	</script>
         </body>
      </html>
