<html>
	<head>
		<h1><center>Factorial of a Number</center></h1><br><hr>
	</head>
	<body>
		<h2><center><script>
			var num= parseInt(prompt("Enter the num-"));
			var fact=1;
			for(let i=1; i<=num; i++)
			{
			fact= fact*i;
			}
			document.write("Factorial of num"+" "+ num +"!"+" "+"is"+" "+ fact);
		</script></center></h2>
	</body>
</html>
