<!DOCTYPE  html>
<html lang="en">
<head>
<center>
<title>User ID and Password Validation</title>
</head>
<body>
	<div>
	<h2>User ID and Password Validation</h2>
	<!-- User ID Input -->
	<input type="text" id ="userId" placeholder="Enter your UserID">
	<p id="UserIdMessage"></p>

	<!-- Password Input -->
	<input type  ="password" Id="password" placeholder="Enter your password">
	
	<p id ="message"></p>
	<!-- validate Button --> 
	<button onclick="ValidateForm()">Validate </button>
	
</div>
<script>
	function ValidateForm(){
	let userId=document.getElementById("userId").value;
	let password=document.getElementById("password").value;

	let userIdMessage=document.getElementById("UserIdMessage");
	let passwordMessage=document.getElementById("message");
	
	const userIdRegex=/^[A-Za-z0-9]{4,}$/;
	const passwordRegex=/^[A-Za-z0-9@$!%*?&]{8,}$/;
		
	if(userIdRegex.test(userId)){
	userIdMessage.style.color="green";
	userIdMessage.textContent="Valid user Id!";
	} else{
	userIdMessage.style.color="red";
	userIdMessage.textContent="user";
	}
	
	if(passwordRegex.test(password)){
	passwordMessage.style.color="green";
	passwordMessage.textContent="Strong password";
	} else{
	passwordMessage.style.color="red";
	passwordMessage.textContent="Password";
	}

	}
</script>
</center>
</body>
</html>
