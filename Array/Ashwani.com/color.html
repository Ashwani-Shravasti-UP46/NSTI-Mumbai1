<title>color code</title>
</head>
<body>
<script>
let color=parseInt(prompt("Enter your color:"));
let result;
switch(color){
case 1:
     result="violet";
       break;

case 2:
      result="indigo";
      break;

case 3:
     result="blue";
     break;
case 4:
 result="green";
     break;
case 5:
 result="yellow";
     break;
case 6:
 result="orange";
     break;
case 7:
 result="red";
     break;

    

 
default:
   result="Invoid input please color";
}
      document.write("color"+color+" color code ="+result);
</script>
</body>
</html>
