<!-- 
=====================================================
PRACTICAL: JavaScript Program for Simple Form Validation
=====================================================

AIM:
- To design a form and validate user input using JavaScript.

OBJECTIVE:
- Create an HTML form with fields: Name, Email, Password.
- Use JavaScript to validate:
  - Name must not be empty.
  - Email must contain "@".
  - Password must be at least 6 characters.
- Show alert messages if invalid, else submit.

TOOLS:
- Web Browser (Chrome/Firefox/Edge)
- Any Text Editor (VS Code/Notepad)

ALGORITHM:
1) Create form with input fields (name, email, password).
2) Add "onsubmit" event that calls validate() function.
3) In validate():
   - If name empty → alert and return false.
   - If email doesn’t contain "@" → alert and return false.
   - If password length < 6 → alert and return false.
4) If all valid → alert "Form Submitted Successfully".
5) End.

STEPS TO RUN:
- Save file as form_validation.html
- Open in browser.

=====================================================
JAVASCRIPT CODE (form_validation.html)
=====================================================
-->

<!DOCTYPE html>
<html>
<head>
  <title>Form Validation</title>
  <script>
    function validate() {
      let name = document.forms["myForm"]["name"].value;
      let email = document.forms["myForm"]["email"].value;
      let pass = document.forms["myForm"]["password"].value;

      if (name === "") {
        alert("Name must be filled out");
        return false;
      }
      if (email.indexOf("@") === -1) {
        alert("Enter a valid email");
        return false;
      }
      if (pass.length < 6) {
        alert("Password must be at least 6 characters");
        return false;
      }

      alert("Form Submitted Successfully ✅");
      return true;
    }
  </script>
</head>
<body>
  <h2>JavaScript Form Validation</h2>

  <form name="myForm" onsubmit="return validate()">
    Name: <input type="text" name="name"><br><br>
    Email: <input type="text" name="email"><br><br>
    Password: <input type="password" name="password"><br><br>
    <input type="submit" value="Submit">
  </form>
</body>
</html>
