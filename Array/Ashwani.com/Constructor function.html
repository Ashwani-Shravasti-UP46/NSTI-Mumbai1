<!DOCTYPE html>
<html>
<head>
<title>Javascript Constructor Function Example</title>
</head>
<body>
<h2> Example Details</h2>
<script>
	function emp(id, name, salary) {
	this.id =id;
	this.name=name;
	this.salary=salary;
	}
	var e=new emp(103,"Vimal jaiswal",30000);
	var e1=new emp(104,"Sreenath", 50000);
	document.write(e.id+" "+e.name+" "+e.salary+" ");
	document.write("<br>"+e1.id+" "+e1.name+" ");
</script>
</body>
</html>
