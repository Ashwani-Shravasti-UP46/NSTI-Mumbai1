<html>
<head>
<center>	<title>Mathematical function in javascript</title>
</head>
<body>
	<h2>Java script mathematical function demo</h2>
<script>
	document.write("<h3>Math Constants</h3>");
	document.write("PI: " + Math.PI.toFixed(2) + "<br>");
	document.write("E: " + Math.E.toFixed(2) + "<br>");
	document.write("SQRT2: " + Math.SQRT2.toFixed(2) + "<br>");
	document.write("LN10: " + Math.LN10.toFixed(2) + "<br><hr>");

	document.write("<h3>Basic Airthmetic Function</h3>");
	document.write("abs(-7): " + Math.abs(-7) + "<br>");
	document.write("round(4.6): " + Math.round(4.6) + "<br>");
	document.write("ceil(4.2): " + Math.ceil(4.2) + "<br>");
	document.write("Floor(4.8): " + Math.floor(4.8) + "<br>");
	document.write("trucn(7.9): " + Math.trunc(7.9) + "<br>");
	document.write("Sign(-25): " + Math.sign(-25) + "<br><hr>");
	
	document.write("<h3>Exponent & Roots </h3>");
	document.write("Pow(2, 5): " + Math.pow(2, 5)+ "<br>");
	document.write("Sqrt(49): " + Math.sqrt(49) + "<br>");
	document.write("cbrt(27): " + Math.cbrt(27) + "<br><hr>");

	document.write("<h3>Loarithmatic Function</h3>");
	document.write("Log(10): " + Math.log(10) + "<br>" );
	document.write("Log10(100): " + Math.log10(100) + "<br>");
	document.write("Log2(8):  " + Math.log2(8) + "<br><hr>");

	document.write("<h3>Trigonometic Function</h3>");
	document.write("Sin(PI/2): " + Math.sin(Math.PI/2) + "<br>" );
	document.write("Cos(PI): " + Math.cos(Math.PI) + "<br>");
	document.write("Tan(PI/4): " + Math.tan(Math.PI/4).toFixed(2) + "<br>");
	document.write("Asin(1): " + Math.asin(1).toFixed(2) + "<br>");
	document.write("Acos(0): " + Math.acos(0).toFixed(2) + "<br>");
	document.write("Atan(1): " + Math.atan(1).toFixed(2) + "<br><hr>");
	
	document.write("<h3>Rondom and utility function</h3>");
	document.write("Random(0-1): " + Math.random() + "<br>");
	document.write("Min(3, 1, 7, 5):  " + Math.min(3, 1, 7, 5) + "<br>");
	document.write("Max(3, 1, 7, 5): " + Math.max(3, 1, 7, 5)  + "<br>");
	
</script> 
</body>
</center>
</html>
