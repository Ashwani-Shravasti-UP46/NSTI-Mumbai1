<html>
<head>
<title>Array example using for each()</title>
</head>
<body>
<script>
let color=["red", "green", "blue", "orange"];
document.write("<h3>list of color:</h3>");
colors.forEach(function(colors,index)
{
document.write((index+1)+ "." + colors +"<br>");   
});
document.write("<h3>Total colors:"+color.length+"</h3>");
</script>
</body>
</html>
