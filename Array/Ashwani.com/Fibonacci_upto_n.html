<html>
	<head><center><h1>Fibonacci Series</h1></center></head><br><hr>
	<body>
		<script>
			// taking limit by user
			var n=parseInt(prompt("Enter the limit of the series-"));
			
			// taking empty variable to store the series
			var fib=[];
		
			//generating the series by for loop

			for(i=0; i<n; i++){
				if(i===0){
					fib[i]=0;}
				else if(i===1){
					fib[i]=1;}
				else{
					fib[i]= fib[i-1]+fib[i-2];
					}}
				document.write("Fibonacci series is-  "+ fib+ ","+" ");

		</script>
	</body>
</html>
