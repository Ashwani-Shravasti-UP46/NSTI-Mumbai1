<!-- 
=====================================================
PRACTICAL: JavaScript Program to Print Fibonacci Series
=====================================================

AIM:
- To write a JavaScript program that generates 
  Fibonacci series up to given number of terms.

OBJECTIVE:
- Accept number of terms from user.
- Use loop to calculate Fibonacci numbers.
- Display series on webpage.

TOOLS:
- Web Browser (Chrome/Firefox/Edge)
- Any Text Editor (VS Code/Notepad)

ALGORITHM:
1) Accept n = number of terms from user.
2) Initialize first = 0, second = 1.
3) Print first two terms.
4) Loop from 3 to n:
      next = first + second
      print next
      update first = second, second = next
5) End.

STEPS TO RUN:
- Save file as fibonacci.html
- Open in browser.
- Enter number of terms when prompted.

=====================================================
JAVASCRIPT CODE (fibonacci.html)
=====================================================
-->

<!DOCTYPE html>
<html>
<head>
  <title>Fibonacci Series</title>
</head>
<body>
  <h2>JavaScript Fibonacci Series</h2>

  <script>
    // Input number of terms
    let n = parseInt(prompt("Enter number of terms:"));

    let first = 0, second = 1, next;

    document.write("Fibonacci Series: <br>");

    for (let i = 1; i <= n; i++) {
      document.write(first + " ");
      next = first + second;
      first = second;
      second = next;
    }
  </script>
</body>
</html>
