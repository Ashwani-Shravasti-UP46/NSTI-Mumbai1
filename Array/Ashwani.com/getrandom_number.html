<html>
<head>
<center><title>Random integer function</title>
</head>
<body>
<script>
	function getRandomInt(min, max){
		return Math.floor(Math.random() * (max - min + 1)) + min;
	}
	
	document.write("Random number between 1 and 100: " + getRandomInt(1,100) + "<br>");
</script>
</body>
</center>
</html>
