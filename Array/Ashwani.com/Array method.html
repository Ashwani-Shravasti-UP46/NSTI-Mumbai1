<html>
<head>
<title>Javascript Array Methods Example</title>
</head>
<body>
<h2>Javascript Array Methods</h2>
<p id = " Output "></p>
<script>
	var employees =["John","Alice","Bob","Sara"];
	document.write("<br>Original Array:</br>"+employees+"<br>");
	employees.push("David");
	document.write("<br>After push('David'):</br>"+employees+"<br>");
	employees.pop();
	document.write("<br> After pop():</b>"+employees+"<br>");
	employees.unshift("Emma");
	document.write("<br>After unshift('Ema'):</br>"+ employees+"<br>");
	employees.shift();
	document.write("<br>After shift():</b>"+employees+"<br>");
	employees.sort();
	document.write("<br>After reverse():</b>"+employees+"<br>");
	employees.reverse();
	document.write("<br>After reverse():</b>"+employees+"<br>");
	document.write("<b>After splice(1,1)'Mike'):</br>"+ employees+"<br>");
	</script>
	</body>
	</html>
