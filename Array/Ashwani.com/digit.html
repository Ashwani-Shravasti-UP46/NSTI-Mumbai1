<!doctype html>
<html>
<head>
<title>digit with(0 to 9)</title>
</head>
<body>
<script>
let digit=parseInt(prompt("Enter the digit(0 to 9):"));
let result;
switch(digit){
case 0:
     result="Zero";
       break;

case 1:
      result="one";
      break;

case 2:
     result="Two";
     break;
case 3:
 result="three";
     break;
case 4:
 result="four";
     break;
case 5:
 result="five";
     break;
case 6:
 result="six";
     break;
case 7:
 result="seven";
     break;
case 8:
 result="Eight";
     break;
case 9:
 result="nine";
     break;

 
default:
       result="Invaid input.please Enter a digit between 0 to 9.";
}
document.write("digit "+digit+"to word = "+result);
</script>
</body>
</html>
