<html>
	<head>
		<h1><center><br>Colour code of the VIBGYOR</br></center></h1><hr>
	</head>
	<body>
		<center><script>
			var colourCode=parseInt(prompt("Enter the colour code for VIBGYOR-"));
			var colour;
			switch(colourCode){
			case 1:
				colour="Violet";
				break;
			case 2:
				colour="Indigo";
				break;
			case 3:
				colour="Blue";
				break;
			case 4:
				colour="Green";
				break;
			case 5:
				colour="Yellow";
				break;
			case 6:
				colour="Orange";
				break;
			case 7:
				colour="Red";
				break;
			default:
				colour="Invalid colour code!";
				break;}
			document.write("<b><br>The colour is -"+ colour+"</b></br>");

		</script></center>
	</body>
	
</html>
