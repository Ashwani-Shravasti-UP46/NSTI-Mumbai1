<!-- 
=====================================================
PRACTICAL: JavaScript Program to Find Factorial
=====================================================

AIM:
- To write a JavaScript program that finds the factorial 
  of a given number.

OBJECTIVE:
- Accept a number from user.
- Calculate factorial using loop.
- Display result.

TOOLS:
- Web Browser (Chrome/Firefox/Edge)
- Any Text Editor (VS Code/Notepad)

ALGORITHM:
1) Accept number from user using prompt().
2) Initialize fact = 1.
3) Loop from 1 to n → fact = fact * i.
4) After loop, display factorial value.
5) End program.

STEPS TO RUN:
- Save file as factorial.html
- Open in browser.
- Enter a number when prompted.

=====================================================
JAVASCRIPT CODE (factorial.html)
=====================================================
-->

<!DOCTYPE html>
<html>
<head>
  <title>Factorial Program</title>
</head>
<body>
  <h2>JavaScript Factorial Program</h2>

  <script>
    // Input number
    let num = parseInt(prompt("Enter a number:"));
    let fact = 1;

    // Factorial logic
    for (let i = 1; i <= num; i++) {
      fact = fact * i;
    }

    // Output
    document.write("Factorial of " + num + " = " + fact);
  </script>
</body>
</html>
