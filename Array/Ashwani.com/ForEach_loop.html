<html>
	<head>
	<title>Array Example using forEach loop</title>
	</head>
	<body>
		<script>
			//Declare an Array of colour
			let colours=["Yello","Green","Red","Pink","white"]
			document.write("<h3>List of colors:</h3>");
	

			//Using forEach loop to display each colour

			colours.forEach(function(colour,index){
			document.write((index+1)+" "+colour+"<br>");
			});
			

			//display total number of colour
			document.write("<h3>total colours:"+colours.length+"</h3>");

		</script>
	</body>
</html>
