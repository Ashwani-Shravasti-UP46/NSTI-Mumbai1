<!doctype html>
<html>
<head>
<title>leap years prompt use</title>
</head>
<body>
<script>
let years=parseInt(prompt("Enter the leap yearscheck or not"));
if(years%4==0 && years%100!=0){
document.write("leap years")
}
else{
document.write("not leap year");
}
</script>
</body>
</html>
