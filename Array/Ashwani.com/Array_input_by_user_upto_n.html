<html>
	<body><center><head><h1> Array Elements input by User</h1></head></center><br><hr>
		<center><script>
			var a, i, n;
			a= new Array();
			n= parseInt(prompt("Enter the limit of the Array:"));
			for(i=0; i<n; i++){
			   a[i]=parseInt(prompt("Enter the Elements-"));}
			   document.write("The Array Element are-"+"<br>");
			for(i=0; i<n; i++){
			   document.write(a[i]+"<br>");}
		</script></center>
	</body>
</html>
