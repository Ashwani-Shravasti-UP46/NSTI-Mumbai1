<html>
<body>
<script>
	var a,n;
	a =new Array();	
	n=parseInt(prompt("Enter array limit :"));
	for(i=0; i<n; i++){
		a[i]=parseInt(prompt("Enter array number:"));
	}
	document.write("The array elements are:");
	
	for(i=0; i<n; i++){
		document.write(a[i]+" ");
	}
	document.write("<br>The sorted element:");
	
	var temp;
	for(i=0; i<n-1; i++){
		for(j=0; j<n-i-1; j++){
		if(a[j]<a[j+1]){
		temp=a[j];
		a[j]=a[j+1];
		a[j+1]=temp;
		}
	}
	}
	for(i=0; i<n; i++){
		document.write(a[i]+" ");
	}
</script>
</body>
</html>
