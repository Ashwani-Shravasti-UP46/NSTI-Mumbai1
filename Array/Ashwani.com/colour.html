<!DOCTYPE html>
<html>
<head>
       <title>Colour code </title>

   </head>
<body>
<script>
let colour =parseInt(prompt("Enter colour(0 to 7)"));
let result;

	switch(colour){

           case 0:
	result="Violet";
         break;
            case 1:
	result="Indigo";
         break;
            case 2:
	result="Blue";
         break;
               case 3:
	result="April";
         break;
                case 4:
	result="Green";
         break;
                   case 5:
	result="Yellow";
         break;
                  case 6:
	result="Orange";
         break;
                case 7:
	result="Red";
         break;
	 
   default:
   result= "invoid input please colour";
}
 document.write("colour:" +colour+result);
</script>
</body>
</html>
