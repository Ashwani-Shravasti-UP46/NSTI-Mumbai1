<!DOCTYPE html>
<html>
<head>
        <title Arithmetic Operators Example</title>
</head>
<body>
<h2>Javascript Arithmetic Operators<h2><script>
let a=20;
let b=6;
let sum=a+b;
let dif=a-b;
let prod=a*b;
let quo=a/b;
let rem=a%b
let exp=a**b;
document.write("a="+a+"<br>");
document.write("b="+b"<br><br>");
document.write("Addition(a+b)="sum+"<br>");
document.write("Subtraction(a-b)="+dif+''<br>");
document.write("Multiplication(a*b)="+prod+''<br>");
document.write("Division(a/b)="+quo.tofixed(2)+''<br>");
document.write("modules(a%b)="+rem+''<br>");
document.write("Exponentiation(a**b)="+exp+''<br>");
</script>
