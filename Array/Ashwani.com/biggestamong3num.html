<html>
	<head>
		<center><h1>Biggest Among Three Numbers</h1></center><br><hr>
	</head>
	<body>
	<center><h2>
		<script>
			var a=parseInt(prompt("Enter the First Number-"));
			var b=parseInt(prompt("Enter the Second Number-"));
			var c=parseInt(prompt("Enter the Third Number-"));
			
			if(a>b){document.write( a+" "+"is the biggest number");}
			else if(a>c){document.write( a+" "+"is the biggest number");}
			else if(b>c){document.write(b+" "+"is the biggest number");}
			else{document.write(c+" "+" is the biggest number");}
				
		</script>
	</h2></center>
	</body>
</html>
