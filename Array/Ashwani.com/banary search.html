<!-- 
=====================================================
PRACTICAL: JavaScript Program for Binary Search
=====================================================

AIM:
- To write a JavaScript program that implements 
  binary search on a sorted array.

OBJECTIVE:
- Accept/search element in a sorted array.
- Use binary search algorithm.
- Display whether element found or not.

TOOLS:
- Web Browser (Chrome/Firefox/Edge)
- Any Text Editor (VS Code/Notepad)

ALGORITHM:
1) Take a sorted array (ascending order).
2) Accept search element from user using prompt().
3) Initialize low = 0, high = arr.length - 1.
4) While low <= high:
      mid = Math.floor((low + high) / 2)
      If arr[mid] == key → found.
      Else if arr[mid] < key → low = mid + 1.
      Else → high = mid - 1.
5) If not found → display message.

STEPS TO RUN:
- Save file as binary_search.html
- Open in browser.

=====================================================
JAVASCRIPT CODE (binary_search.html)
=====================================================
-->

<!DOCTYPE html>
<html>
<head>
  <title>Binary Search</title>
</head>
<body>
  <h2>JavaScript Binary Search</h2>

  <script>
    // Sorted array
    let arr = [10, 20, 30, 40, 50, 60, 70];
    let key = parseInt(prompt("Enter number to search:"));

    let low = 0, high = arr.length - 1;
    let found = false;

    while (low <= high) {
      let mid = Math.floor((low + high) / 2);
      if (arr[mid] === key) {
        found = true;
        break;
      } else if (arr[mid] < key) {
        low = mid + 1;
      } else {
        high = mid - 1;
      }
    }

    if (found) {
      document.write(key + " found in array.");
    } else {
      document.write(key + " not found in array.");
    }
  </script>
</body>
</html>

<!--
================= SAMPLE OUTPUT =================

Array = [10, 20, 30, 40, 50, 60, 70]

Case 1:
Input: 40
Output: 40 found in array.

Case 2:
Input: 25
Output: 25 not found in array.

=================================================
RESULT:
- Successfully implemented JavaScript program 
  to search an element using Binary Search.
=================================================
-->
