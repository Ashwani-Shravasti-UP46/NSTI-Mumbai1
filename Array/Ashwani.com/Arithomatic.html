<html>
<head>
<title> Arithometic operators Example </title>
</head>
<body>
<h2>javascript operators</h2>
<script>

let a = 20;
let b = 6;
document.write("a="+a+"<br>");
document.write("b="+b+"<br>");

document.write("Addition(a+b)="+(a+b)+"<br>");
document.write("Subtraction(a-b)="+(a-b)+"<br>");
document.write("Multiplication(a*b)="+(a*b)+"<br>");
document.write("Division(a/b)="+(a/b)+"<br>");
document.write("Modules(a%b)="+(a%b)+"<br>");
document.write("Exponention(a**b)="+(a**b)+"<br>");
document.write("Increment(++a)="+(++a)+"<br>");
document.write("decrement(--b)="+(--b)+"<br>");
</script>
</body>
</html>
