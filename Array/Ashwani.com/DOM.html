<html>
<head>
	<title>getElementByName Example</title>
</head>
<body>
	<label>Enter  Name: </label>
	<input type="text" name="UserInput" value="Krishna">
	<br><br>

	<label>Enter age: </label>
	<input type="text" name="UserInput" value="18">
	<br><br>

	<button onclick="getvalue()"> Get Value </button>
	<p id="result"> </p>
<script>
	function getvalue(){
		let inputs=document.getElementsByName("UserInput");
		let value=[];

		for(var i=0; i<inputs.length; i++){
		       value.push(inputs[i].value);
		}
		document.getElementById("result").innerHTML="value: " +   value.join(",");
	}
</script>
</body>
