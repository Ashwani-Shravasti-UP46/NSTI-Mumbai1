<html>
<head>
	<title>Arrow Function demo</title>
</head>
<body>
	<h3>Arrow function Demo</h3>
<script>
	const numbers = [5, 10, 15 ,20];
	
	const total = arr => arr.reduce((sum, n) => sum+n, 0);

	const average = arr => total(arr)/arr.length;

	document.write("<h3> Numbers: </h3>" + numbers.join(",") + "<br>");
	document.write("Sum= " + total(numbers) + "<br>");
	document.write("Average= " + average(numbers).toFixed(2));
</script>
</body>
</html>
