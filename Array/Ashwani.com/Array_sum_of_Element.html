<html>
	<body><center><head><h1>Sum of Array Elements</h1></head></center><br><hr>
		<center><script>
			var a, i, n,sum=0;
			n= parseInt(prompt("Enter the limit of the Array:"));
			a= new Array(n);
			for(i=0; i<n; i++){
			   a[i]=parseInt(prompt("Enter the Elements-"));
			   sum=sum+a[i]
			   }
			   document.write("The Array Element are-"+" ");
			for(i=0; i<n; i++){
			   document.write(a[i]+" ");
			   }
			   document.write("<br><br>"+"sum of Array Element- "+sum);

		</script></center>
	</body>
</html>
