<html>
	<head>
		<h1><center>Count the Number of Paragraph</center></h1><br><hr><br>
	</head>
	<body>
		<center><script>
			function countpara() {
			var totalpara = document.getElementsByTagName("p");
			alert("Total P Tags are: " + totalpara.length);}
		</script></center><br>

		<center <p> This is a Paragraph </p>
		<p> Here we are going to count Paragraph by using getElementByTagName() Method </p>
		<p> lets see the simple example </p>
		<p> lets see the Welcome message </p>
		<button onclick = "countpara()"> Count Paragragh </button> </center> 
	</body>
</html>
