<html>
      <head>
            <title>javascript variable example</title>
                                                                 </head>
<script>
         let a=20;
        let b=5;
document.write("a="+a+"<br>");
document.write("b="+b+"<br><br>");
document.write("addision(a+b)="+(a+b)+"<br>");
document.write("subtraction(a-b)="+(a-b)+"<br>");
document.write("maltiplication(a*b)="+(a*b)+"<br>");
document.write("Division(a/b)="+(a/b)+"<br>");
document.write("modulas(a%b)="+(a%b)+"<br>");
document.write("expontiation(a**b)="+(a**b)+"<br>");
document.write("increment(++a)="+(++a)+"<br>");
document.write("Decrement(--b)="+(--b)+"<br>");

</script>
</body>
</html>
