<html>
<body>
<script>
	var a, n, sk, fc=0;
	n=parseInt(prompt("Enter the limit:"));
	a=new Array();
	
	for(i=0; i<n; i++){
		a[i]=parseInt(prompt("Enter the array element:"));
	}
	document.write("The array element are:");
	for(i=0; i<n; i++){
		document.write(a[i]+" ");
	}
	
	sk=parseInt(prompt("Enter the ellment who repeat in this array:"));
	for(i=0; i<n; i++){
		if(a[i]===sk){
		fc++;
	}
	}
	if(fc>0){
		document.write("<br>The frequency number is:"+sk+"it's repeated this time"+fc);
	}
	else{
		document.write("<br>There is no repeated number");
	}
</script>
</body>
</html>
