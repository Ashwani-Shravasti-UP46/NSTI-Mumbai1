<html>
	<body><body><center><head><h1> Bubble Sorting </h1></head></center><br><hr>
		<center><script>
			var a,n,i,j;
			n= parseInt(prompt("Enter the limit of the Array:"));
			a= [n];
			for(i=0; i<n; i++){
			   a[i]=parseInt(prompt("Enter the Elements-"));}
			   document.write("The Array Element are-"+" ");
			for(i=0; i<n; i++){
			   document.write(a[i]+"  ");}


			//Bubble sorting
			

			document.write("<br>"+"The sorted Array is-: "+ " ");		
			for(i=0; i<n-1; i++){
				for(j=0; j<n-i-1; j++){
					if(a[j]>a[j+1]){
					    let temp=a[j];
						a[j]=a[j+1];
						a[j+1]=temp;}}}

			for(i=0; i<n; i++){
			   document.write(a[i]+"  ");}
					
		</script></center>
	</body>
</html>
