<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Binary Search</title>
</head>

<body>
  <h2>Binary Search (Without inbuilt sort)</h2>

  <script>
    let arr, n;

    n = parseInt(prompt("Enter limit of Array :"));
    arr = new Array(n);

    document.write("<br>Limit of Array : " + n);

    // Reading array elements
    for (let i = 0; i < n; i++) {
      arr[i] = parseInt(prompt("Enter element :"));
    }

    // 🔹 Manual Sorting (Bubble Sort)
    for (let i = 0; i < n - 1; i++) {
      for (let j = 0; j < n - 1 - i; j++) {
        if (arr[j] > arr[j + 1]) {
          let temp = arr[j];
          arr[j] = arr[j + 1];
          arr[j + 1] = temp;
        }
      }
    }

    // Displaying Sorted Array
    document.write("<br>Sorted Array : ");
    for (let i = 0; i < n; i++) {
      document.write(arr[i] + " ");
    }

    // 🔹 Binary Search
    document.write("<hr><strong>Binary Search -</strong>");

    let searchKey = parseInt(prompt("Enter Search Key :"));
    let initial = 0, final = n - 1, mid;

    while (initial <= final) {
      mid = Math.floor((initial + final) / 2);

      if (searchKey > arr[mid]) {
        initial = mid + 1;
      } 
      else if (searchKey < arr[mid]) {
        final = mid - 1;
      } 
      else {
        document.write("<br>Element found at index : " + mid);
        break;
      }
    }

    if (initial > final) {
      document.write("<br>Element not found");
    }

  </script>

</body>

</html>
