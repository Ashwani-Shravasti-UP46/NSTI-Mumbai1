<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArraySum</title>
</head>
<body>
    <h1>Developed Javascript Code to find sum of Elements in Array</h1>
    <script>
        let a,i,n,sum=0,avg=0,max,min;
        a = new Array();
        n = parseInt(prompt("Enter limit"));

        for(i=0; i<n; i++){
            a[i] = parseInt(prompt("Enter The Element of Array "));
            sum = sum + a[i];
        }
        document.writeln("the Array Element are : ");
        for(i=0; i<n; i++){
            document.writeln(a[i]+" ");
        }
        max = a[0];
        min = a[0]; 
        for(i=0; i<n; i++){
            if(a[i]>max){
                max=a[i];
            }
            if(a[i]<min){
                min=a[i];
            }
        }
        avg=sum/n;
        document.writeln("<br> sum of array elements are : "+sum);
        document.writeln("<br> avg of array elements are : "+avg);
        document.writeln("<br> max of array elements are : "+max);
        document.writeln("<br> min of array elements are : "+min);
    </script>
</body>
</html>
