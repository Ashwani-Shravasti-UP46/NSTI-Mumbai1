<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shravasti ITI Job Portal</title>

<style>
body{font-family:Arial;background:#f4f7fb;margin:0}
header{background:#1f3c88;color:#fff;padding:20px;text-align:center}
.container{max-width:900px;margin:auto;padding:20px}
.section{background:#fff;padding:20px;margin:15px 0;border-radius:10px}
input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc}
button{background:#1f3c88;color:#fff;padding:10px;border:none;border-radius:6px}
</style>

</head>
<body>

<header>
<h1>Shravasti ITI Job Portal</h1>
</header>

<div class="container">

<div class="section">
<h2>Apply for Job</h2>

<form action="submit.php" method="post" enctype="multipart/form-data">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="mobile" placeholder="Mobile Number" required>

<input type="text" name="qualification" placeholder="ITI Trade" required>

<input type="text" name="job" placeholder="Job Role" required>

<textarea name="address" placeholder="Address" required></textarea>

<input type="file" name="resume" required>

<button type="submit">Apply Now</button>

</form>

</div>

</div>
</body>
</html>
