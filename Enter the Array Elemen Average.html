<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Ashwani.com</title>
<style>
    body{
        background-color: #f0f0f0;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 50px;
    }
    h1 {
        color: #333;
    }
    p {
        color: #666;
        font-size: 18px;
    }
</style>
</head>

<body>
        <h1>Welcome to Ashwani.com</h1>
        <p>Located in<a href=""> Shravasti, UP 46</a></p>

        <script>
        var a, i, n, sum = 0;
        n = parseInt(prompt("Enter the Array limit:  "));
        a = new Array(n);
        for (i = 0; i < n; i++) {
            a[i] = parseInt(prompt("Enter the Array Element: "));
            sum = sum + a[i];
        }
        document.write("Enter the Elemen  are : ");
        for (i = 0; i < n; i++) { 
            document.write(a[i] + " ");
        }
        let min = a[0];
        let max = a[0];
        for (i=0; i < n; i++) {
            if (a[i]< min) min = a[i];
            if (a[i] > max) max = a[i];
        }
        document.write("<hr>Sum of all Elements: " + sum + "<hr>"); 
        document.write("Minimum Element is: " + min + "<hr>"); 
        document.write("Maximum Element is: " + max + "<hr>");
        document.write("Average of all Elements: " + (sum / n) + "<hr>");
    </script>
</body>
   

</html>
