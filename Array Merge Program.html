<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Merge Program</title>
</head>

<body>
    <h1>Array Merge Program in JavaScript</h1>

    <script>
        let a, b, c;

        // First Array
        let n1 = parseInt(prompt("Enter the limit of 1st array :"));
        a = new Array(n1);

        for (let i = 0; i < n1; i++) {
            a[i] = parseInt(prompt("Enter element of first array: " + (i + 1)));
        }
        document.write("<h3>Your Entered First Array: " + a.join(" ") + "</h3>");

        // Second Array
        let n2 = parseInt(prompt("Enter limit of second array:"));
        b = new Array(n2);

        for (let i = 0; i < n2; i++) {
            b[i] = parseInt(prompt("Enter element of second array: " + (i + 1)));
        }

        document.write("<h3>Your Entered Second Array: " + b.join(" ") + "</h3>");

        c = new Array();

        // Merge Arrays

        for (let i = 0; i < n1; i++) {
            c[i] = a[i];
        }

        for (let i = 0; i < n2; i++) {
            c[n1 + i] = b[i];
        }
        // Display Merged Array
        document.write("<h3>Merged Array: </h3>");

        for (let i = 0; i < (n1 + n2); i++) {
            document.write(c[i] + " ");
        }

    </script>

</body>

</html>
