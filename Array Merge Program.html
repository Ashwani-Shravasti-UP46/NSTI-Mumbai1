<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Merge Program</title>
</head>
<body>
    <h1>Array Merge Program in JavaScript</h1>

<script>
    let a = [], b = [], c = [];

    // First Array
    let num1 = parseInt(prompt("Enter size of first array:"));
    document.write("<h3>Array lenth (1st), </b> :" + num1+ "<br>")

    for (let i = 0; i < num1; i++) {
        a[i] = parseInt(prompt("Enter element " + (i + 1) + " of first array:"));
    }

    document.write("<h3>Your Entered First Array: " + a.join(" ") + "</h3>");

    // Second Array
    let num2 = parseInt(prompt("Enter size of second array:"));
    document.write("<h3>Array lenth (2nd), </b>:" + num2+ "<br>")

    for (let i = 0; i < num2; i++) {
        b[i] = parseInt(prompt("Enter element " + (i + 1) + " of second array:"));
    }

    document.write("<h3>Your Entered Second Array: " + b.join(" ") + "</h3>");

    // Merge Arrays
    for (let i = 0; i < num1; i++) {
        c[i] = a[i];
    }

    for (let i = 0; i < num2; i++) {
        c[num1 + i] = b[i];
    }

    document.write("<h2>Merged Array: " + c.join(" ") + "</h2>");
</script>

</body>
</html>
