<!DOCTYPE html>
<html>
<head>
    <title>Merge and Sort Array</title>
</head>
<body>
    <h1>Develop JavaScript code to Merge and Sort Two Arrays</h1>
    <script>
        var a, b, c;
        var i, n1, n2;
        a = new Array();
        b = new Array();
        c = new Array();
        // First Array Input
        n1 = parseInt(prompt("Enter the limit of First Array: "));
        for (i = 0; i < n1; i++) {
            a[i] = parseInt(prompt("Enter element for First Array: "));
        }
        // Second Array Input
        n2 = parseInt(prompt("Enter the limit of Second Array: "));
        for (i = 0; i < n2; i++) {
            b[i] = parseInt(prompt("Enter element for Second Array: "));
        }
        // Merge Arrays
        for (i = 0; i < n1; i++) {
            c[i] = a[i];
        }
        for (i = 0; i < n2; i++) {
            c[n1 + i] = b[i];
        }
        // Sorting (Ascending Order)
        c.sort(function(x, y) {
            return x - y;
        });
        // Display Arrays
        document.write("<br>First Array: " + a + "<br>");
        document.write("<br>Second Array: " + b + "<br>");
        document.write("<br>Merged and Sorted Array: " + c + "<br><br>");

        document.write("Sorted Elements Individually:<br>");
        for (i = 0; i < (n1 + n2); i++) {
            document.write(c[i] + " ");
        }

    </script>
</body>
</html>
